<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Library Energy During Exams</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <header class="header">
        <div class="header-content">
            <div>
                <h1><i class="fa-solid fa-book"></i> Library Energy During Exams</h1>
                <p class="sub">Linear Regression · WebSocket Real-Time · Temperature/Weather</p>
            </div>
            <div class="header-info">
                <div class="status-badge" id="wsBadge"><span class="status-dot"></span> Connecting...</div>
                <div class="last-update" id="lastUpdate">--</div>
            </div>
        </div>
    </header>
    <main class="container">
        <div class="dashboard-grid four-col" id="kpiCards">
            <div class="loading">
                <div class="spinner"></div>
            </div>
        </div>
        <div class="dashboard-grid">
            <div class="card full-width">
                <div class="card-header">
                    <div>
                        <h2 class="card-title"><i class="fa-solid fa-chart-line"></i> Live Energy Stream</h2>
                        <p class="sub">Actual vs Predicted — real-time via WebSocket</p>
                    </div>
                </div>
                <div id="liveChart" class="chart-container">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="dashboard-grid">
            <div class="card">
                <h2 class="card-title"><i class="fa-solid fa-sun"></i> Lunch Surge Analysis</h2>
                <div id="surgeChart" class="chart-container">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
            <div class="card">
                <h2 class="card-title"><i class="fa-solid fa-weight-scale"></i> Regression Coefficients</h2>
                <div id="coefChart" class="chart-container">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="dashboard-grid">
            <div class="card">
                <h2 class="card-title"><i class="fa-solid fa-temperature-half"></i> Temperature vs Energy</h2>
                <div id="tempChart" class="chart-container">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
            <div class="card">
                <h2 class="card-title"><i class="fa-solid fa-clock"></i> Hourly Energy Pattern</h2>
                <div id="hourlyChart" class="chart-container">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="/static/app.js"></script>
</body>

</html>

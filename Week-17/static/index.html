<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Data Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <span class="logo"><i class="fa-solid fa-database"></i> User Data Dashboard</span>
            <div class="export-buttons">
                <button class="export-btn" onclick="exportData('csv')"><i class="fa-solid fa-file-csv"></i> Export CSV</button>
                <button class="export-btn" onclick="exportData('pdf')"><i class="fa-solid fa-file-pdf"></i> Export PDF</button>
            </div>
        </div>
    </header>
    <main>
        <section id="status-banner" class="status-banner hidden"></section>
        <section class="table-section">
            <table id="data-table">
                <thead>
                    <tr id="table-header"></tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </section>
    </main>
    <footer>
        <span>© 2026 Data Insights Team</span>
    </footer>
    <script src="/static/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>User Registration Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <!-- AUTH VIEW -->
    <div id="authView" class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo"><i class="fa-solid fa-user-shield"
                        style="background:var(--gradient-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent"></i>
                </div>
                <div class="auth-title">User Registration Portal</div>
                <div class="auth-subtitle">JWT Authentication · Encrypted Profiles · Wearable Sync</div>
            </div>
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab('login')"><i
                        class="fa-solid fa-right-to-bracket"></i> Login</button>
                <button class="auth-tab" onclick="switchTab('register')"><i class="fa-solid fa-user-plus"></i>
                    Register</button>
            </div>
            <!-- LOGIN -->
            <form id="loginForm" class="auth-form" onsubmit="login(event)">
                <div class="form-group"><label>Username</label><input type="text" id="lUser"
                        placeholder="Enter username" required></div>
                <div class="form-group"><label>Password</label><input type="password" id="lPass"
                        placeholder="Enter password" required></div>
                <div id="lMsg" class="form-error"></div>
                <button type="submit" class="btn btn-primary"><i class="fa-solid fa-right-to-bracket"></i> Sign
                    In</button>
            </form>
            <!-- REGISTER -->
            <form id="registerForm" class="auth-form" style="display:none" onsubmit="register(event)">
                <div class="form-group"><label>Username</label><input type="text" id="rUser"
                        placeholder="Choose a username" required></div>
                <div class="form-group"><label>Email</label><input type="email" id="rEmail" placeholder="your@email.com"
                        required></div>
                <div class="form-group"><label>Password</label><input type="password" id="rPass"
                        placeholder="Create password" required></div>
                <div id="rMsg" class="form-error"></div>
                <button type="submit" class="btn btn-primary"><i class="fa-solid fa-user-plus"></i> Create
                    Account</button>
            </form>
        </div>
    </div>

    <!-- DASHBOARD VIEW -->
    <div id="dashView" style="display:none">
        <header class="dash-header">
            <div class="dash-header-content">
                <div class="dash-title"><i class="fa-solid fa-user-shield"></i> User Portal</div>
                <div class="dash-user">
                    <span id="dashUsername" style="color:var(--text-secondary);font-size:.9rem"></span>
                    <div class="avatar" id="dashAvatar" style="background:var(--gradient-primary)"></div>
                    <button class="btn btn-outline btn-sm" onclick="logout()"><i
                            class="fa-solid fa-right-from-bracket"></i> Logout</button>
                </div>
            </div>
        </header>
        <main class="dash-main">
            <div class="dash-grid" style="margin-bottom:var(--spacing-md)">
                <!-- Profile Card -->
                <div class="card profile-card">
                    <div class="card-title"><i class="fa-solid fa-user"></i> Profile</div>
                    <div id="profileContent">
                        <div class="loading">
                            <div class="spinner"></div>
                        </div>
                    </div>
                </div>
                <!-- Wearable Sync Card -->
                <div class="card">
                    <div class="card-title"><i class="fa-solid fa-heart-pulse"></i> Wearable Sync</div>
                    <div class="card-subtitle">Send health data from your wearable device</div>
                    <form onsubmit="syncWearable(event)" style="margin-top:var(--spacing-sm)">
                        <div class="form-group"><label>Heart Rate (BPM)</label><input type="number" id="wHR"
                                placeholder="72" value="72"></div>
                        <div class="form-group"><label>Steps</label><input type="number" id="wSteps" placeholder="5000"
                                value="5000"></div>
                        <div class="form-group"><label>Calories</label><input type="number" id="wCal" placeholder="250"
                                value="250"></div>
                        <div id="wMsg" class="form-success"></div>
                        <button type="submit" class="btn btn-primary"><i class="fa-solid fa-rotate"></i> Sync
                            Data</button>
                    </form>
                </div>
            </div>
            <!-- User Directory -->
            <div class="card" style="margin-bottom:var(--spacing-md)">
                <div class="card-title"><i class="fa-solid fa-users"></i> User Directory</div>
                <div class="card-subtitle">All registered members</div>
                <div id="userDirectory">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="/static/app.js"></script>
</body>

</html>

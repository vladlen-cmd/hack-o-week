<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>User Registration Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <header class="header">
        <div class="header-content">
            <div>
                <h1><i class="fa-solid fa-user-shield"></i> User Registration Portal</h1>
                <p class="sub">JWT Authentication · Encrypted Profiles · Wearable Sync</p>
            </div>
            <div class="header-info">
                <div id="authStatus" class="status-badge"><span class="status-dot off"></span> Not logged in</div>
            </div>
        </div>
    </header>
    <main class="container">
        <div id="authSection">
            <div class="dashboard-grid">
                <div class="card" style="max-width:420px;margin:0 auto">
                    <div class="tab-bar"><button class="tab active" onclick="switchTab('login')">Login</button><button
                            class="tab" onclick="switchTab('register')">Register</button></div>
                    <div id="loginForm" class="auth-form">
                        <input type="text" id="lUser" placeholder="Username" class="input"><input type="password"
                            id="lPass" placeholder="Password" class="input">
                        <button class="btn" onclick="login()"><i class="fa-solid fa-right-to-bracket"></i>
                            Login</button>
                        <p id="lMsg" class="msg"></p>
                    </div>
                    <div id="registerForm" class="auth-form" style="display:none">
                        <input type="text" id="rUser" placeholder="Username" class="input"><input type="email"
                            id="rEmail" placeholder="Email" class="input"><input type="password" id="rPass"
                            placeholder="Password" class="input">
                        <button class="btn" onclick="register()"><i class="fa-solid fa-user-plus"></i> Register</button>
                        <p id="rMsg" class="msg"></p>
                    </div>
                </div>
            </div>
        </div>
        <div id="dashSection" style="display:none">
            <div class="dashboard-grid three-col" id="kpiCards"></div>
            <div class="dashboard-grid">
                <div class="card">
                    <h2 class="card-title"><i class="fa-solid fa-user"></i> Profile</h2>
                    <div id="profileCard">
                        <div class="loading">
                            <div class="spinner"></div>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <h2 class="card-title"><i class="fa-solid fa-clock"></i> Wearable Sync</h2>
                    <div style="padding:.5rem 0"><input type="number" id="wHR" placeholder="Heart Rate"
                            class="input"><input type="number" id="wSteps" placeholder="Steps" class="input"><input
                            type="number" id="wCal" placeholder="Calories" class="input">
                        <button class="btn" onclick="syncWearable()"><i class="fa-solid fa-rotate"></i> Sync</button>
                        <p id="wMsg" class="msg"></p>
                    </div>
                </div>
            </div>
            <div class="dashboard-grid">
                <div class="card full-width">
                    <h2 class="card-title"><i class="fa-solid fa-users"></i> User Directory</h2>
                    <div id="userTable">
                        <div class="loading">
                            <div class="spinner"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="/static/app.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>User Registration Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="app" id="app">
        <!-- AUTH VIEW -->
        <div class="auth-container" id="authView">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-logo"><i class="fa-solid fa-user"></i></div>
                    <h1 class="auth-title">Hack-O-Week Portal</h1>
                    <p class="auth-subtitle" id="authSubtitle">Create your account</p>
                </div>
                <div class="auth-tabs">
                    <button class="auth-tab active" id="tabRegister" onclick="switchTab('register')">Register</button>
                    <button class="auth-tab" id="tabLogin" onclick="switchTab('login')">Login</button>
                </div>

                <!-- REGISTER FORM -->
                <form id="registerForm" class="auth-form" onsubmit="handleRegister(event)">
                    <div class="form-group"><label>Username</label><input type="text" id="regUsername"
                            placeholder="Choose a username" required minlength="3"></div>
                    <div class="form-group"><label>Email</label><input type="email" id="regEmail"
                            placeholder="you@example.com" required></div>
                    <div class="form-group"><label>Full Name</label><input type="text" id="regFullName"
                            placeholder="Your full name"></div>
                    <div class="form-group"><label>Department</label><select id="regDept">
                            <option value="">Select department</option>
                            <option>Computer Science</option>
                            <option>Electronics</option>
                            <option>Mathematics</option>
                            <option>Design</option>
                            <option>Social Sciences</option>
                            <option>Humanities</option>
                        </select></div>
                    <div class="form-group"><label>Password</label><input type="password" id="regPassword"
                            placeholder="Min 6 characters" required minlength="6"></div>
                    <div class="form-group"><label>Confirm Password</label><input type="password" id="regConfirm"
                            placeholder="Confirm password" required></div>
                    <div id="regError" class="form-error"></div>
                    <button type="submit" class="btn btn-primary" id="regBtn">Create Account</button>
                </form>

                <!-- LOGIN FORM -->
                <form id="loginForm" class="auth-form" style="display:none" onsubmit="handleLogin(event)">
                    <div class="form-group"><label>Username or Email</label><input type="text" id="loginId"
                            placeholder="Username or email" required></div>
                    <div class="form-group"><label>Password</label><input type="password" id="loginPassword"
                            placeholder="Your password" required></div>
                    <div id="loginError" class="form-error"></div>
                    <button type="submit" class="btn btn-primary" id="loginBtn">Sign In</button>
                </form>
            </div>
        </div>

        <!-- DASHBOARD VIEW -->
        <div class="dashboard" id="dashView" style="display:none">
            <header class="dash-header">
                <div class="dash-header-content">
                    <h1 class="dash-title"><i class="fa-solid fa-user"></i> Registration Portal</h1>
                    <div class="dash-user">
                        <div class="avatar" id="userAvatar"></div>
                        <span id="userName"></span>
                        <button class="btn btn-outline btn-sm" onclick="handleLogout()">Logout</button>
                    </div>
                </div>
            </header>
            <main class="dash-main">
                <div class="dash-grid">
                    <div class="card profile-card">
                        <h2 class="card-title">My Profile</h2>
                        <div id="profileContent">
                            <div class="loading">
                                <div class="spinner"></div>
                            </div>
                        </div>
                    </div>
                    <div class="card">
                        <h2 class="card-title">Edit Profile</h2>
                        <form id="editForm" class="auth-form" onsubmit="handleEditProfile(event)">
                            <div class="form-group"><label>Full Name</label><input type="text" id="editName"
                                    placeholder="Full name"></div>
                            <div class="form-group"><label>Department</label><select id="editDept">
                                    <option value="">Select</option>
                                    <option>Computer Science</option>
                                    <option>Electronics</option>
                                    <option>Mathematics</option>
                                    <option>Design</option>
                                    <option>Social Sciences</option>
                                    <option>Humanities</option>
                                </select></div>
                            <div id="editMsg" class="form-success"></div>
                            <button type="submit" class="btn btn-primary">Update Profile</button>
                        </form>
                    </div>
                </div>
                <div class="card" style="margin-top:1.5rem">
                    <h2 class="card-title">All Registered Users</h2>
                    <p class="card-subtitle" id="userCount">Loading...</p>
                    <div id="usersTable" style="margin-top:1rem">
                        <div class="loading">
                            <div class="spinner"></div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="/static/app.js?v=1"></script>
</body>

</html>

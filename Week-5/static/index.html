<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>HVAC Optimization in Labs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <header class="header">
        <div class="header-content">
            <div>
                <h1><i class="fa-solid fa-snowflake"></i> HVAC Optimization in Labs</h1>
                <p class="sub">Decision Tree · Zone Heatmaps · Occupancy/Temperature</p>
            </div>
            <div class="header-info">
                <div class="status-badge"><span class="status-dot"></span> Active</div>
            </div>
        </div>
    </header>
    <main class="container">
        <div class="dashboard-grid three-col" id="kpiCards">
            <div class="loading">
                <div class="spinner"></div>
            </div>
        </div>
        <div class="dashboard-grid">
            <div class="card full-width">
                <h2 class="card-title"><i class="fa-solid fa-th"></i> Zone-Wise Cooling Heatmap</h2>
                <p class="sub">Hour × Zone — Predicted cooling needs</p>
                <div id="heatChart" class="chart-container">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="dashboard-grid">
            <div class="card">
                <h2 class="card-title"><i class="fa-solid fa-ranking-star"></i> Feature Importance</h2>
                <div id="fiChart" class="chart-container">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
            <div class="card">
                <h2 class="card-title"><i class="fa-solid fa-temperature-half"></i> Outdoor Temp vs Cooling</h2>
                <div id="tempChart" class="chart-container">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="dashboard-grid">
            <div class="card">
                <h2 class="card-title"><i class="fa-solid fa-users"></i> Occupancy vs Cooling</h2>
                <div id="occChart" class="chart-container">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
            <div class="card">
                <h2 class="card-title"><i class="fa-solid fa-clock"></i> Hourly by Zone</h2>
                <div id="hourlyChart" class="chart-container">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="/static/app.js"></script>
</body>

</html>

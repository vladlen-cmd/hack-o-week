<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Hostel Laundry Peak Prediction</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <header class="header">
        <div class="header-content">
            <div>
                <h1><i class="fa-solid fa-basket-shopping"></i> Hostel Laundry Peak Prediction</h1>
                <p class="card-subtitle">KNN Regression · Peak Hour Analytics</p>
            </div>
            <div class="header-info">
                <div class="status-badge"><span class="status-dot"></span> Live</div>
                <div class="last-update" id="lastUpdate">--</div>
            </div>
        </div>
    </header>
    <main class="container">
        <div class="dashboard-grid three-col">
            <div class="card prediction-card">
                <div class="card-header">
                    <div>
                        <h2 class="card-title">Next Hour</h2>
                        <p class="card-subtitle">KNN Forecast</p>
                    </div>
                </div>
                <div id="pred">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
            <div class="card peak-card">
                <div class="card-header">
                    <div>
                        <h2 class="card-title">Peak Analysis</h2>
                        <p class="card-subtitle">Usage patterns</p>
                    </div>
                </div>
                <div id="peakContent">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="card-header">
                    <div>
                        <h2 class="card-title">Model Performance</h2>
                        <p class="card-subtitle">KNN metrics</p>
                    </div>
                </div>
                <div id="metrics">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="dashboard-grid">
            <div class="card full-width">
                <div class="card-header">
                    <div>
                        <h2 class="card-title">Energy Timeline</h2>
                    </div>
                </div>
                <div id="tsChart" class="chart-container">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="dashboard-grid">
            <div class="card">
                <div class="card-header">
                    <div>
                        <h2 class="card-title">Hourly Pattern</h2>
                    </div>
                </div>
                <div id="hourlyChart" class="chart-container">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="card-header">
                    <div>
                        <h2 class="card-title">Feature Importance</h2>
                    </div>
                </div>
                <div id="featChart" class="chart-container">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="dashboard-grid">
            <div class="card">
                <div class="card-header">
                    <div>
                        <h2 class="card-title">Machines Correlation</h2>
                    </div>
                </div>
                <div id="corrChart" class="chart-container">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="card-header">
                    <div>
                        <h2 class="card-title">Weekly Heatmap</h2>
                    </div>
                </div>
                <div id="heatChart" class="chart-container">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="/static/app.js?v=1"></script>
</body>

</html>
